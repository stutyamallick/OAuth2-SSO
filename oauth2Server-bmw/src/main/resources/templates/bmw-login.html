<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMW OAuth2 Login</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
    }

    .container {
        display: flex;
        width: 100%;
        height: 100vh;
    }

    /* LEFT SECTION */
    .left-section {
        width: 40%;
        background-color: #f2f2f2;
        padding: 80px 60px;
    }

    .left-section h1 {
        font-size: 32px;
        font-weight: 400;
        color: #1c2b39;
        margin-bottom: 40px;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #3a4a5a;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #999;
        font-size: 14px;
        background-color: #fff;
    }

    .login-btn {
        margin-top: 20px;
        width: 100%;
        padding: 14px;
        background-color: #bfbfbf;
        border: none;
        font-weight: bold;
        letter-spacing: 1px;
        cursor: pointer;
    }

    .login-btn:hover {
        background-color: #a8a8a8;
    }

    /* RIGHT SECTION */
    .right-section {
        width: 60%;
        background-image: url('/images/540i.PNG');
        background-size: cover;
        background-position: center;
        position: relative;
    }

    /* Optional subtle overlay for soft fade effect */
    .right-section::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 150px;
        height: 100%;
        background: linear-gradient(to right, rgba(242,242,242,1), rgba(242,242,242,0));
    }

    /* Responsive */
    @media (max-width: 900px) {
        .container {
            flex-direction: column;
        }
        .left-section, .right-section {
            width: 100%;
            height: 50vh;
        }
    }
</style>
</head>

<body>

<div class="container">

  <div class="left-section">
    <h1>BMW OAuth2 LOGIN</h1>

    <form id="loginForm" method="post" th:action="@{/login}">
      <div class="form-group">
        <label>BMW ID</label>
        <input type="username" id="username" name="username" required >
      </div>

      <div class="form-group">
        <label>Your Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn">LOGIN</button>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    </form>

    <div th:if="${param.error}">
          <span class="error-message" id="passwordError">
            Invalid credentials. Please try again.
          </span>
    </div>
  </div>

  <div class="right-section"></div>

</div>

</body>
</html>
