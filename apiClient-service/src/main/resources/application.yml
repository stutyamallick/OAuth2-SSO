server:
  port: 8082
spring:
  main:
    web-application-type: REACTIVE
    allow-bean-definition-overriding: true
  cloud:
    gateway:
#      default-filters:
#        -DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: bmw-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/**
          filters:
            - TokenRelay=
        - id: web-app
          uri: http://localhost:4000/
          predicates:
            - Path=/**
  security:
    oauth2:
      client:
        provider:
          oauth2Server-bmw:
            issuer-uri: http://localhost:8100
        registration:
          service-proxy-client:
            client-id: serviceClient
            client-name: Login Via BMW Base
            client-secret: serviceSecret
            provider: oauth2Server-bmw
            client-authentication-method: client_secret_basic
            redirect-uri: http://localhost:8082/login/oauth2/code/service-proxy-client
            scope:
              - openid